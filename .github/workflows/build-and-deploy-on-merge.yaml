name: Build and Deploy - Merge main
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch Workflow
        uses: timescale/workflow-dispatch-action@main
        with:
          github-token: ${{ secrets.ORG_AUTOMATION_TOKEN }}
          owner: timescale
          repo: tiger-agents-deploy
          workflow_id: build.yaml
          ref: 'AGE-449-grafana-mcp'
          inputs: >
            {
              "repository": "tiger-grafana-mcp-server",
              "sha": "${{ github.sha }}",
              "latest": true
            }

  deploy:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        include:
          - env: dev
            namespace: savannah-system
            notify_slack: false
          # prod (tiger-mcp) disabled until prod secrets and config are ready
    steps:
      - name: Dispatch Workflow - ${{ matrix.env }}
        uses: timescale/workflow-dispatch-action@main
        with:
          github-token: ${{ secrets.ORG_AUTOMATION_TOKEN }}
          owner: timescale
          repo: tiger-agents-deploy
          workflow_id: deploy.yaml
          ref: 'AGE-449-grafana-mcp'
          inputs: >
            {
              "repository": "tiger-grafana-mcp-server",
              "sha": "${{ github.sha }}",
              "env": "${{ matrix.env }}",
              "namespace": "${{ matrix.namespace }}",
              "notify_slack": ${{ matrix.notify_slack }}
            }
