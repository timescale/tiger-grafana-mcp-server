name: Build and Deploy - Feature Branch Push
on:
  push:
    branches-ignore:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch Workflow
        uses: timescale/workflow-dispatch-action@main
        with:
          github-token: ${{ secrets.ORG_AUTOMATION_TOKEN }}
          owner: timescale
          repo: tiger-agents-deploy
          workflow_id: build.yaml
          ref: 'AGE-449-grafana-mcp'
          inputs: '{"repository": "tiger-grafana-mcp-server", "sha": "${{ github.sha }}"}'
  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Dispatch Workflow
        uses: timescale/workflow-dispatch-action@main
        with:
          github-token: ${{ secrets.ORG_AUTOMATION_TOKEN }}
          owner: timescale
          repo: tiger-agents-deploy
          workflow_id: deploy.yaml
          ref: 'AGE-449-grafana-mcp'
          inputs: >
            {
              "repository": "tiger-grafana-mcp-server",
              "sha": "${{ github.sha }}",
              "env": "dev",
              "namespace": "savannah-system"
            }
